name: Setup CUDA Toolkit
description: Install and configure CUDA Toolkit

runs:
  using: composite
  steps:
    - name: Install CUDA toolkit
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y nvidia-cuda-toolkit

    - name: Export CUDA environment
      shell: bash
      run: |
        CUDA_PATH="$(dirname "$(dirname "$(readlink -f "$(command -v nvcc)")")")"
        echo "CUDA_PATH=$CUDA_PATH" >> "$GITHUB_ENV"
        echo "$CUDA_PATH/bin" >> "$GITHUB_PATH"

    - name: Print CUDA info
      shell: bash
      run: |
        echo "CUDA install location: $CUDA_PATH"
        nvcc -V
