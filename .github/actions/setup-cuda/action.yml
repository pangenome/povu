name: Setup CUDA Toolkit
description: Install and configure CUDA Toolkit

inputs:
  cuda-version:
    description: CUDA version in package form, e.g. 13-2, 12-8, 12-4
    required: false
    default: "13-2"

runs:
  using: composite
  steps:
    - name: Install NVIDIA CUDA apt repository
      shell: bash
      run: |
        set -eux
        . /etc/os-release
        ubuntu_version="$(echo "$VERSION_ID" | tr -d '.')"
        repo_url="https://developer.download.nvidia.com/compute/cuda/repos/ubuntu${ubuntu_version}/x86_64/cuda-keyring_1.1-1_all.deb"

        wget -q "$repo_url"
        sudo dpkg -i cuda-keyring_1.1-1_all.deb
        sudo apt-get update

    - name: Install minimal CUDA compiler/runtime dev packages
      shell: bash
      run: |
        sudo apt-get install -y \
          cuda-nvcc-${{ inputs.cuda-version }} \
          cuda-cudart-dev-${{ inputs.cuda-version }}

    - name: Export CUDA environment
      shell: bash
      run: |
        CUDA_PATH="/usr/local/cuda"
        echo "CUDA_PATH=$CUDA_PATH" >> "$GITHUB_ENV"
        echo "$CUDA_PATH/bin" >> "$GITHUB_PATH"

    - name: Print CUDA info
      shell: bash
      run: |
        export PATH="$CUDA_PATH/bin:$PATH"
        echo "CUDA install location: $CUDA_PATH"
        which nvcc
        nvcc -V
