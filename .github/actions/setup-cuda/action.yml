name: Setup CUDA Toolkit
description: Install and configure CUDA Toolkit

inputs:
  cuda-version:
    description: CUDA version in package form, e.g. 12-4
    required: false
    default: "12-4"

runs:
  using: composite
  steps:
    - name: Install minimal CUDA compiler/runtime dev packages
      shell: bash
      run: |
        sudo apt-get install -y \
          cuda-nvcc-${{ inputs.cuda-version }} \
          cuda-cudart-dev-${{ inputs.cuda-version }}

    - name: Export CUDA environment
      shell: bash
      run: |
        CUDA_PATH="$(dirname "$(dirname "$(readlink -f "$(command -v nvcc)")")")"
        echo "CUDA_PATH=$CUDA_PATH" >> "$GITHUB_ENV"
        echo "$CUDA_PATH/bin" >> "$GITHUB_PATH"

    - name: Print CUDA info
      shell: bash
      run: |
        echo "CUDA install location: $CUDA_PATH"
        nvcc -V
